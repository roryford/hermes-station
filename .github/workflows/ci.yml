name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  security-events: write  # required for uploading Trivy SARIF results

jobs:
  unit:
    name: unit tests + lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: install (with dev) into a venv
        run: |
          uv venv --python 3.12
          uv pip install -e ".[dev]"

      - name: ruff
        run: .venv/bin/ruff check hermes_station tests

      - name: ruff format
        run: .venv/bin/ruff format --check hermes_station tests

      - name: mypy
        run: .venv/bin/mypy hermes_station --ignore-missing-imports

      - name: pytest
        run: .venv/bin/pytest -q

      - name: Verify Dockerfile retry wrappers present
        run: |
          grep -c -- "--retry-all-errors" Dockerfile | awk '{ if ($1 < 3) { print "Retry wrapper missing on at least one curl"; exit 1 } }'

  build:
    name: build image + smoke
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          load: true
          target: runtime
          tags: hermes-station:ci
          build-args: |
            IMAGE_REVISION=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # provenance/sbom both off when load:true — docker daemon can't ingest
          # manifest lists, and buildx emits one whenever either attestor is on.
          # Re-enable behind a separate push-only build if attestation matters.
          provenance: false
          sbom: false

      - name: scan image (Trivy)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: hermes-station:ci
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true   # suppress CVEs with no fix available in the package ecosystem
          trivyignores: .trivyignore  # accepted risks with confirmed no-fix-available
          exit-code: "0"  # warn only; don't fail the build on first scan

      - name: upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@458d36d7d4f47d0dd16ca424c1d3cda0060f1360 # v3.35.5
        with:
          sarif_file: trivy-results.sarif

      - name: boot container
        run: |
          docker run -d --name hs-smoke \
            -p 8787:8787 \
            -e HERMES_WEBUI_PASSWORD=ci -e HERMES_ADMIN_PASSWORD=ci \
            -v /tmp/hs-data:/data \
            hermes-station:ci
          for i in $(seq 1 60); do
            code=$(curl -s -o /tmp/health.json -w '%{http_code}' http://127.0.0.1:8787/health 2>/dev/null || echo 000)
            [ "$code" = "200" ] && echo "healthy after ${i}s" && break
            sleep 1
          done
          test "$code" = "200"
          jq -e '.versions.image_revision | test("^[0-9a-f]{7,40}$")' /tmp/health.json
          jq -e '.versions.hermes_webui != null' /tmp/health.json

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: install test deps
        run: |
          uv venv --python 3.12
          uv pip install -e ".[dev]"

      - name: login smoke (CSRF / proxy Host forwarding)
        env:
          HERMES_STATION_E2E_URL: http://127.0.0.1:8787
          HERMES_STATION_E2E_PASSWORD: ci
        # --no-cov: this is an integration step against the running container,
        # not a unit run — pyproject's --cov-fail-under=85 makes no sense for
        # a single-file invocation that doesn't exercise the package directly.
        run: .venv/bin/pytest tests/test_login_smoke.py -q --no-cov

      - name: container logs on failure
        if: failure()
        run: docker logs hs-smoke || true
