name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  unit:
    name: unit tests + lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          # No uv.lock yet; key cache on pyproject.toml instead.
          cache-dependency-glob: pyproject.toml

      - name: install (with dev) into a venv
        run: |
          uv venv --python 3.12
          uv pip install -e ".[dev]"

      - name: ruff
        run: .venv/bin/ruff check hermes_station tests

      - name: pytest
        run: .venv/bin/pytest -q

  build:
    name: build image + smoke
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: build
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: hermes-station:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: boot + smoke /health
        run: |
          docker run -d --name hs-smoke \
            -p 8787:8787 \
            -e HERMES_WEBUI_PASSWORD=ci -e HERMES_ADMIN_PASSWORD=ci \
            -v /tmp/hs-data:/data \
            hermes-station:ci
          for i in $(seq 1 60); do
            code=$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:8787/health 2>/dev/null || echo 000)
            [ "$code" = "200" ] && echo "healthy after ${i}s" && break
            sleep 1
          done
          test "$code" = "200"

      - name: smoke logs on failure
        if: failure()
        run: docker logs hs-smoke || true

      - name: export image for e2e job
        run: docker save hermes-station:ci -o /tmp/hermes-station-ci.tar

      - uses: actions/upload-artifact@v4
        with:
          name: hermes-station-ci-image
          path: /tmp/hermes-station-ci.tar
          retention-days: 1

  e2e:
    name: e2e (browser)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: hermes-station-ci-image
          path: /tmp

      - name: load image
        run: docker load -i /tmp/hermes-station-ci.tar

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml

      - name: install e2e deps
        run: |
          uv venv --python 3.12
          uv pip install -e ".[dev,e2e]"

      - name: cache playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}

      - name: install chromium
        run: .venv/bin/playwright install --with-deps chromium

      - name: boot container
        run: |
          docker run -d --name hs-e2e \
            -p 8787:8787 \
            -e HERMES_WEBUI_PASSWORD=ci -e HERMES_ADMIN_PASSWORD=ci \
            -v /tmp/hs-data:/data \
            hermes-station:ci
          for i in $(seq 1 60); do
            code=$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:8787/health 2>/dev/null || echo 000)
            [ "$code" = "200" ] && echo "healthy after ${i}s" && break
            sleep 1
          done
          test "$code" = "200"

      - name: e2e (real browser through proxy)
        env:
          HERMES_STATION_E2E_URL: http://127.0.0.1:8787
          HERMES_STATION_E2E_PASSWORD: ci
        run: .venv/bin/pytest tests/e2e -q

      - name: container logs on failure
        if: failure()
        run: docker logs hs-e2e || true
