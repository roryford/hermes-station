name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  security-events: write  # required for uploading Trivy SARIF results

jobs:
  unit:
    name: unit tests + lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: install (with dev) into a venv
        run: |
          uv venv --python 3.12
          uv pip install -e ".[dev]"

      - name: ruff
        run: .venv/bin/ruff check hermes_station tests

      - name: ruff format
        run: .venv/bin/ruff format --check hermes_station tests

      - name: mypy
        run: .venv/bin/mypy hermes_station --ignore-missing-imports

      - name: pytest
        run: .venv/bin/pytest -q

      - name: Verify curl retry wrappers present
        run: |
          count=$(grep -h -c -- "--retry-all-errors" Dockerfile.base scripts/install_pinned_binaries.sh | awk '{ s += $1 } END { print s }')
          if [ "$count" -lt 3 ]; then
            echo "Retry wrapper missing on at least one curl (found $count)"
            exit 1
          fi

  build-and-smoke:
    name: build images + smoke + e2e + scan
    runs-on: ubuntu-latest
    needs: [unit]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: pre-pack build context (mirrors local /tmp/hs-ctx procedure)
        # The Dockerfile uses `ADD <name>.tar` to bypass an Apple `container` CLI
        # 0.12.3 bug where subdirectory COPY silently empties. CI must produce
        # the same tar layout so the same Dockerfile works on Linux buildx.
        # See CLAUDE.md and project memory project-container-cli-build-workaround.md.
        run: |
          mkdir -p /tmp/hs-ctx/hermes_station
          cp pyproject.toml README.md LICENSE uv.lock .dockerignore /tmp/hs-ctx/
          cp scripts/patch_plugin_manifests.py scripts/hermes-entrypoint.sh /tmp/hs-ctx/
          # Staged for the deps-cache COPY (kept separate from the source tar
          # so changes to package source don't bust the uv pip install cache).
          cp hermes_station/__init__.py /tmp/hs-ctx/hermes_station/__init__.py
          tar -c --exclude '__pycache__' --exclude '*.pyc' -f /tmp/hs-ctx/hermes_station.tar hermes_station
          tar -c --exclude '__pycache__' -f /tmp/hs-ctx/extension.tar extension
          tar -c --exclude '__pycache__' --exclude '*.pyc' -f /tmp/hs-ctx/tests.tar tests
          tar -c -f /tmp/hs-ctx/docs.tar docs
          cp Dockerfile /tmp/hs-ctx/

      - name: build runtime image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: /tmp/hs-ctx
          load: true
          target: runtime
          tags: hermes-station:ci
          build-args: |
            IMAGE_REVISION=${{ github.sha }}
          cache-from: type=gha
          # Only main writes the gha cache. PRs read it but never export, so
          # per-PR layer copies (scoped to refs/pull/N/merge and never reused)
          # can't fill GitHub's 10GB cache budget and evict main's layers.
          cache-to: ${{ github.ref == 'refs/heads/main' && 'type=gha,mode=max' || '' }}
          # provenance/sbom both off when load:true — docker daemon can't ingest
          # manifest lists, and buildx emits one whenever either attestor is on.
          # Re-enable behind a separate push-only build if attestation matters.
          provenance: false
          sbom: false

      - name: build test image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: /tmp/hs-ctx
          load: true
          target: test
          tags: hermes-station:ci-test
          build-args: |
            IMAGE_REVISION=${{ github.sha }}
          cache-from: type=gha
          # Only main writes the gha cache. PRs read it but never export, so
          # per-PR layer copies (scoped to refs/pull/N/merge and never reused)
          # can't fill GitHub's 10GB cache budget and evict main's layers.
          cache-to: ${{ github.ref == 'refs/heads/main' && 'type=gha,mode=max' || '' }}
          provenance: false
          sbom: false

      - name: scan image (Trivy)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: hermes-station:ci
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true   # suppress CVEs with no fix available in the package ecosystem
          trivyignores: .trivyignore  # accepted risks with confirmed no-fix-available
          exit-code: "0"  # warn only; don't fail the build on first scan

      - name: upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
        with:
          sarif_file: trivy-results.sarif

      - name: boot container
        run: |
          docker run -d --name hs-smoke \
            -p 8787:8787 \
            -e HERMES_WEBUI_PASSWORD=ci -e HERMES_ADMIN_PASSWORD=ci \
            -e OPENROUTER_API_KEY=ci-fake-key \
            -v /tmp/hs-data:/data \
            hermes-station:ci
          for i in $(seq 1 60); do
            code=$(curl -s -o /tmp/health.json -w '%{http_code}' http://127.0.0.1:8787/health 2>/dev/null || echo 000)
            [ "$code" = "200" ] && echo "healthy after ${i}s" && break
            sleep 1
          done
          test "$code" = "200"
          jq -e '.versions.image_revision | test("^[0-9a-f]{7,40}$")' /tmp/health.json
          jq -e '.versions.hermes_webui != null' /tmp/health.json

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: install test deps
        run: |
          uv venv --python 3.12
          uv pip install -e ".[dev]"

      - name: e2e + integration tests (host-runnable)
        env:
          HERMES_STATION_E2E_URL: http://127.0.0.1:8787
          HERMES_STATION_E2E_PASSWORD: ci
          HERMES_STATION_E2E_ADMIN_PASSWORD: ci
        run: |
          .venv/bin/pytest tests/ \
            --ignore=tests/fixtures \
            --ignore=tests/test_compat_realistic.py \
            --ignore=tests/test_container_toolbelt.py \
            --ignore=tests/test_plugin_manifests.py \
            -q --no-cov

      - name: in-container tests (toolbelt + plugin manifests)
        run: |
          docker run --rm --network=host \
            -e HERMES_STATION_REQUIRE_TOOLBELT=1 \
            -e HERMES_STATION_E2E_URL=http://127.0.0.1:8787 \
            -e HERMES_STATION_E2E_PASSWORD=ci \
            -e HERMES_STATION_E2E_ADMIN_PASSWORD=ci \
            hermes-station:ci-test \
            python -m pytest \
              tests/test_container_toolbelt.py \
              tests/test_plugin_manifests.py \
              -v --no-cov

      - name: container logs on failure
        if: failure()
        run: docker logs hs-smoke || true
