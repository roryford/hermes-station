name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  unit:
    name: unit tests + lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3.2.4
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: install (with dev) into a venv
        run: |
          uv venv --python 3.12
          uv pip install -e ".[dev]"

      - name: ruff
        run: .venv/bin/ruff check hermes_station tests

      - name: ruff format
        run: .venv/bin/ruff format --check hermes_station tests

      - name: pytest
        run: .venv/bin/pytest -q

  build:
    name: build image + smoke
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          load: true
          tags: hermes-station:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: boot container
        run: |
          docker run -d --name hs-smoke \
            -p 8787:8787 \
            -e HERMES_WEBUI_PASSWORD=ci -e HERMES_ADMIN_PASSWORD=ci \
            -v /tmp/hs-data:/data \
            hermes-station:ci
          for i in $(seq 1 60); do
            code=$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:8787/health 2>/dev/null || echo 000)
            [ "$code" = "200" ] && echo "healthy after ${i}s" && break
            sleep 1
          done
          test "$code" = "200"

      - uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3.2.4
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: install test deps
        run: |
          uv venv --python 3.12
          uv pip install -e ".[dev]"

      - name: login smoke (CSRF / proxy Host forwarding)
        env:
          HERMES_STATION_E2E_URL: http://127.0.0.1:8787
          HERMES_STATION_E2E_PASSWORD: ci
        run: .venv/bin/pytest tests/test_login_smoke.py -q

      - name: container logs on failure
        if: failure()
        run: docker logs hs-smoke || true
