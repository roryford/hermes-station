name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write  # required for GHCR push

jobs:
  release:
    name: create GitHub release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0  # full history so git log can reach the previous tag

      - name: generate release notes from conventional commits
        id: notes
        run: |
          PREV=$(git tag --sort=-v:refname | grep -v "^${GITHUB_REF_NAME}$" | head -1)
          echo "previous tag: $PREV"
          NOTES=$(git log "${PREV}..HEAD" --pretty=format:"- %s" --no-merges \
            | grep -E "^- (feat|fix|perf|refactor|chore|docs|build|ci|security)\b" \
            | sort)
          if [ -z "$NOTES" ]; then
            NOTES="- maintenance and internal improvements"
          fi
          {
            echo "body<<EOF"
            echo "## What's changed"
            echo ""
            echo "$NOTES"
            echo ""
            echo "**Full changelog:** https://github.com/roryford/hermes-station/compare/${PREV}...${GITHUB_REF_NAME}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          name: ${{ github.ref_name }}
          body: ${{ steps.notes.outputs.body }}
          make_latest: true

  publish:
    name: build + push image to GHCR
    runs-on: ubuntu-latest
    needs: release
    outputs:
      image: ${{ steps.meta.outputs.tags && 'ghcr.io/roryford/hermes-station:latest' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: log in to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: image metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ghcr.io/roryford/hermes-station
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: build and push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          target: runtime
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            IMAGE_REVISION=${{ github.sha }}
          no-cache: true
          provenance: false
          sbom: false

  deploy:
    name: update Railway hermes-dx-eval → new image
    runs-on: ubuntu-latest
    needs: publish
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_SERVICE_ID: a74d9666-4e53-494f-9dc9-f73b608836f4
      RAILWAY_ENVIRONMENT_ID: ddbd4898-55eb-4e67-b993-b170644b0931
    steps:
      - name: point service at new image
        # Use the specific version tag (semver strips v-prefix: v0.1.3 → 0.1.3).
        # Must run AFTER publish so Railway resolves the tag to the just-pushed digest,
        # not a previously-pinned one. Never use :latest here — Railway pins the digest
        # at serviceInstanceUpdate time and won't re-resolve on redeploy.
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          curl -fsSL https://backboard.railway.com/graphql/v2 \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{
              \"query\": \"mutation Update(\$svc: String!, \$env: String!, \$in: ServiceInstanceUpdateInput!) { serviceInstanceUpdate(serviceId: \$svc, environmentId: \$env, input: \$in) }\",
              \"variables\": {
                \"svc\": \"$RAILWAY_SERVICE_ID\",
                \"env\": \"$RAILWAY_ENVIRONMENT_ID\",
                \"in\": { \"source\": { \"image\": \"ghcr.io/roryford/hermes-station:$VERSION\" } }
              }
            }"

      - name: deploy from new image source
        # serviceInstanceDeploy deploys using the CURRENT service config (image source
        # just set above). serviceInstanceRedeploy reuses the last deployment's config
        # and would ignore the source change.
        run: |
          curl -fsSL https://backboard.railway.com/graphql/v2 \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{
              \"query\": \"mutation Deploy(\$svc: String!, \$env: String!) { serviceInstanceDeploy(serviceId: \$svc, environmentId: \$env, latestCommit: false) }\",
              \"variables\": {
                \"svc\": \"$RAILWAY_SERVICE_ID\",
                \"env\": \"$RAILWAY_ENVIRONMENT_ID\"
              }
            }"
