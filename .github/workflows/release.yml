name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.9.2)"
        required: true

permissions:
  contents: write
  packages: write  # required for GHCR push

jobs:
  release:
    name: create GitHub release
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0  # full history so git log can reach the previous tag
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: generate release notes
        id: notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Notes assembly lives in scripts/generate-release-notes.sh so the
        # same logic powers both CI and local backfills (gh release edit).
        run: |
          BODY=$(bash scripts/generate-release-notes.sh "${{ env.RELEASE_TAG }}")
          {
            echo "body<<RELEASE_NOTES_EOF"
            echo "$BODY"
            echo "RELEASE_NOTES_EOF"
          } >> "$GITHUB_OUTPUT"

      - uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_TAG }}
          body: ${{ steps.notes.outputs.body }}
          make_latest: true

  publish:
    name: build + push image to GHCR
    runs-on: ubuntu-latest
    needs: release
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: image metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ghcr.io/roryford/hermes-station
          tags: |
            type=semver,pattern={{version}},value=${{ env.RELEASE_TAG }}
            type=raw,value=latest

      - name: pre-pack build context (mirrors local /tmp/hs-ctx procedure)
        # See CLAUDE.md and project memory project-container-cli-build-workaround.md
        # for why the Dockerfile uses `ADD <name>.tar` instead of `COPY`.
        run: |
          mkdir -p /tmp/hs-ctx/hermes_station
          cp pyproject.toml README.md LICENSE uv.lock .dockerignore /tmp/hs-ctx/
          cp scripts/patch_plugin_manifests.py scripts/hermes-entrypoint.sh /tmp/hs-ctx/
          # Staged for the deps-cache COPY (kept separate from the source tar
          # so changes to package source don't bust the uv pip install cache).
          cp hermes_station/__init__.py /tmp/hs-ctx/hermes_station/__init__.py
          tar -c --exclude '__pycache__' --exclude '*.pyc' -f /tmp/hs-ctx/hermes_station.tar hermes_station
          tar -c --exclude '__pycache__' -f /tmp/hs-ctx/extension.tar extension
          tar -c --exclude '__pycache__' --exclude '*.pyc' -f /tmp/hs-ctx/tests.tar tests
          tar -c -f /tmp/hs-ctx/docs.tar docs
          cp Dockerfile /tmp/hs-ctx/

      - name: build and push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: /tmp/hs-ctx
          target: runtime
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            IMAGE_REVISION=${{ github.sha }}
          no-cache: true
          provenance: false
          sbom: false
