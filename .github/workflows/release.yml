name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write  # required for GHCR push

jobs:
  release:
    name: create GitHub release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0  # full history so git log can reach the previous tag

      - name: generate release notes
        id: notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Notes assembly lives in scripts/generate-release-notes.sh so the
        # same logic powers both CI and local backfills (gh release edit).
        run: |
          BODY=$(bash scripts/generate-release-notes.sh "${GITHUB_REF_NAME}")
          {
            echo "body<<RELEASE_NOTES_EOF"
            echo "$BODY"
            echo "RELEASE_NOTES_EOF"
          } >> "$GITHUB_OUTPUT"

      - uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          name: ${{ github.ref_name }}
          body: ${{ steps.notes.outputs.body }}
          make_latest: true

  publish:
    name: build + push image to GHCR
    runs-on: ubuntu-latest
    needs: release
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: image metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ghcr.io/roryford/hermes-station
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: build and push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          target: runtime
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            IMAGE_REVISION=${{ github.sha }}
          no-cache: true
          provenance: false
          sbom: false

  deploy-prod:
    name: deploy to Railway production
    runs-on: ubuntu-latest
    needs: publish
    # The `production` environment gates this job. Configure required reviewers
    # under repo Settings → Environments → production so prod deploys pause for
    # a human nod before firing the Railway mutation.
    environment:
      name: production
      url: https://chat.roryford.com
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_SERVICE_ID: ${{ secrets.RAILWAY_PROD_SERVICE_ID }}
      RAILWAY_ENVIRONMENT_ID: ${{ secrets.RAILWAY_PROD_ENVIRONMENT_ID }}
    steps:
      - name: log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: wait for GHCR manifest to propagate
        run: |
          IMAGE="ghcr.io/roryford/hermes-station:${GITHUB_REF_NAME}"
          for i in $(seq 1 60); do
            if docker manifest inspect "$IMAGE" >/dev/null 2>&1; then
              echo "manifest available after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "ERROR: manifest did not appear within 60s" >&2
          exit 1

      - name: trigger Railway production deploy
        # serviceInstanceDeploy makes Railway re-pull the image tag the service
        # is pinned to (ghcr.io/roryford/hermes-station:latest, just updated by
        # the publish job). latestCommit:false because the service is
        # image-sourced, not git-sourced.
        run: |
          curl -fsSL https://backboard.railway.com/graphql/v2 \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{
              \"query\": \"mutation Deploy(\$svc: String!, \$env: String!) { serviceInstanceDeploy(serviceId: \$svc, environmentId: \$env, latestCommit: false) }\",
              \"variables\": {
                \"svc\": \"$RAILWAY_SERVICE_ID\",
                \"env\": \"$RAILWAY_ENVIRONMENT_ID\"
              }
            }"

      - name: wait for prod to serve new revision
        run: |
          SHA="${{ github.sha }}"
          for i in $(seq 1 90); do
            REV=$(curl -sf "https://chat.roryford.com/health" \
              | python3 -c "import sys,json; print(json.load(sys.stdin).get('versions',{}).get('image_revision',''))" 2>/dev/null || echo "")
            if [ "$REV" = "$SHA" ]; then
              echo "prod serving $SHA after $((i * 5))s"
              exit 0
            fi
            sleep 5
          done
          echo "ERROR: prod did not serve new revision within 450s" >&2
          exit 1
