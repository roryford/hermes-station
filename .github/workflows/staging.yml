name: staging

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch, tag, or SHA to build and deploy"
        required: false
        default: main

# Only one staging pipeline runs at a time. A newer push cancels the
# in-progress run so Railway doesn't queue two competing deploys and cause
# the earlier run's readiness check to time out waiting for the wrong image.
concurrency:
  group: staging
  cancel-in-progress: true

permissions:
  contents: read
  packages: write  # required for GHCR push

env:
  STAGING_URL: https://hermes-station-staging.up.railway.app

jobs:
  build-and-deploy:
    name: build image + deploy to staging
    runs-on: ubuntu-latest
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_SERVICE_ID: ${{ secrets.RAILWAY_STAGING_SERVICE_ID }}
      RAILWAY_ENVIRONMENT_ID: ${{ secrets.RAILWAY_STAGING_ENVIRONMENT_ID }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ inputs.ref || github.sha }}

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: pre-pack build context (mirrors local /tmp/hs-ctx procedure)
        # See CLAUDE.md for why the Dockerfile uses `ADD <name>.tar` instead of `COPY`.
        run: |
          mkdir -p /tmp/hs-ctx
          cp .dockerignore /tmp/hs-ctx/
          cp scripts/patch_plugin_manifests.py scripts/hermes-entrypoint.sh /tmp/hs-ctx/
          cp supervisord.conf /tmp/hs-ctx/
          tar -c --exclude '__pycache__' --exclude '*.pyc' -f /tmp/hs-ctx/tests.tar tests
          tar -c -f /tmp/hs-ctx/docs.tar docs
          cp Dockerfile /tmp/hs-ctx/

      - name: build and push :staging
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: /tmp/hs-ctx
          target: runtime
          push: true
          tags: |
            ghcr.io/roryford/hermes-station:staging
            ghcr.io/roryford/hermes-station:staging-${{ github.sha }}
          build-args: |
            IMAGE_REVISION=${{ github.sha }}
          # Reuse the layer cache ci writes on main (read-only here to avoid
          # racing ci's concurrent cache-to on the same push).
          cache-from: type=gha
          provenance: false
          sbom: false

      - name: wait for GHCR manifest to propagate
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          IMAGE="ghcr.io/roryford/hermes-station:staging"
          echo "$GHCR_TOKEN" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          for i in $(seq 1 60); do
            if docker manifest inspect "$IMAGE" >/dev/null 2>&1; then
              echo "manifest available after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "ERROR: manifest did not appear within 60s" >&2
          exit 1

      - name: deploy to staging
        env:
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
        run: |
          # Use a SHA-specific tag so Railway sees a new image source and
          # creates a real deployment (not a no-op redeploy of the same digest).
          # serviceInstanceUpdate changes the source; serviceInstanceDeploy fires it.
          IMAGE="ghcr.io/roryford/hermes-station:staging-${{ github.sha }}"

          curl -fsSL https://backboard.railway.com/graphql/v2 \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"query\":\"mutation { serviceInstanceUpdate(serviceId: \\\"$RAILWAY_SERVICE_ID\\\", environmentId: \\\"$RAILWAY_ENVIRONMENT_ID\\\", input: { source: { image: \\\"${IMAGE}\\\" } }) }\"}" \
            | python3 -c "import sys,json; r=json.load(sys.stdin); print(r); exit(1 if r.get('errors') else 0)"

          curl -fsSL https://backboard.railway.com/graphql/v2 \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"query\":\"mutation { serviceInstanceDeploy(serviceId: \\\"$RAILWAY_SERVICE_ID\\\", environmentId: \\\"$RAILWAY_ENVIRONMENT_ID\\\") }\"}" \
            | python3 -c "import sys,json; r=json.load(sys.stdin); print(r); exit(1 if r.get('errors') else 0)"

  e2e:
    name: e2e tests against staging
    runs-on: ubuntu-latest
    needs: build-and-deploy
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ inputs.ref || github.sha }}

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: install test deps
        run: |
          uv venv --python 3.12
          uv pip install pytest httpx requests pytest-cov

      - name: fetch staging credentials from Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
          RAILWAY_SERVICE_ID: ${{ secrets.RAILWAY_STAGING_SERVICE_ID }}
          RAILWAY_ENVIRONMENT_ID: ${{ secrets.RAILWAY_STAGING_ENVIRONMENT_ID }}
        run: |
          VARS=$(curl -fsSL https://backboard.railway.com/graphql/v2 \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            --data-raw "{\"query\":\"query { variables(projectId: \\\"$RAILWAY_PROJECT_ID\\\", serviceId: \\\"$RAILWAY_SERVICE_ID\\\", environmentId: \\\"$RAILWAY_ENVIRONMENT_ID\\\") }\"}")
          WEBUI_PW=$(echo "$VARS" | python3 -c "import sys,json; print(json.load(sys.stdin)['data']['variables']['HERMES_WEBUI_PASSWORD'])")
          echo "::add-mask::$WEBUI_PW"
          echo "STAGING_WEBUI_PASSWORD=$WEBUI_PW" >> "$GITHUB_ENV"

      - name: wait for staging to be ready
        run: |
          # Two-phase readiness check.
          #
          # Phase 1: /health returns 200. This proves the new container is up.
          #
          # Phase 2: probe the endpoints the e2e tests hit and require 3
          # consecutive non-5xx responses. Empirically, Railway can serve /health
          # while still 502'ing on /login and /api/auth/status for several
          # seconds after rollout — see staging flake on 2db320e / 8dd2c1d.
          #
          # Give Railway time to start the rollout. The deploy mutation returns
          # before Railway has begun pulling and starting the new container;
          # probing immediately just sees the old container (or connection refused
          # during the swap) and burns through retries before the new image is up.
          echo "waiting 20s for Railway to begin rollout..."
          sleep 20
          set -e
          for i in $(seq 1 90); do
            code=$(curl -sf -o /dev/null -w "%{http_code}" "$STAGING_URL/health" 2>/dev/null || echo "000")
            if [ "$code" = "200" ]; then
              echo "phase 1: /health 200 after $((i * 5))s"
              break
            fi
            sleep 5
          done
          if [ "$code" != "200" ]; then
            echo "ERROR: staging /health did not return 200 within 450s" >&2
            exit 1
          fi

          probe_nonfivexx() {
            local code
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$1" || echo "000")
            case "$code" in
              5*|000) return 1 ;;
              *)      return 0 ;;
            esac
          }
          for endpoint in /login /api/auth/status; do
            url="${STAGING_URL}${endpoint}"
            consecutive=0
            stable=0
            for i in $(seq 1 60); do
              if probe_nonfivexx "$url"; then
                consecutive=$((consecutive + 1))
                if [ "$consecutive" -ge 3 ]; then
                  echo "phase 2: $endpoint stable (3 consecutive non-5xx after $((i * 2))s)"
                  stable=1
                  break
                fi
              else
                consecutive=0
              fi
              sleep 2
            done
            if [ "$stable" -ne 1 ]; then
              echo "ERROR: $endpoint did not stabilize within 120s" >&2
              exit 1
            fi
          done

      - name: run e2e tests
        env:
          HERMES_STATION_E2E_URL: ${{ env.STAGING_URL }}
          HERMES_STATION_E2E_PASSWORD: ${{ env.STAGING_WEBUI_PASSWORD }}
        run: |
          .venv/bin/pytest tests/ \
            --ignore=tests/fixtures \
            --ignore=tests/test_container_toolbelt.py \
            --ignore=tests/test_plugin_manifests.py \
            --ignore=tests/test_version.py \
            -v --no-cov
