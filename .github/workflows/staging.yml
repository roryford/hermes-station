name: staging

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write  # required for GHCR push

env:
  STAGING_URL: https://hermes-station-staging.up.railway.app

jobs:
  build-and-deploy:
    name: build image + deploy to staging
    runs-on: ubuntu-latest
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_SERVICE_ID: ${{ secrets.RAILWAY_STAGING_SERVICE_ID }}
      RAILWAY_ENVIRONMENT_ID: ${{ secrets.RAILWAY_STAGING_ENVIRONMENT_ID }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: pre-pack build context (mirrors local /tmp/hs-ctx procedure)
        # See CLAUDE.md and project memory project-container-cli-build-workaround.md
        # for why the Dockerfile uses `ADD <name>.tar` instead of `COPY`.
        run: |
          mkdir -p /tmp/hs-ctx/hermes_station
          cp pyproject.toml README.md LICENSE uv.lock .dockerignore /tmp/hs-ctx/
          cp scripts/patch_plugin_manifests.py scripts/pinned-binaries.tsv scripts/install_pinned_binaries.sh scripts/hermes-entrypoint.sh /tmp/hs-ctx/
          # Staged for the deps-cache COPY (kept separate from the source tar
          # so changes to package source don't bust the uv pip install cache).
          cp hermes_station/__init__.py /tmp/hs-ctx/hermes_station/__init__.py
          tar -c --exclude '__pycache__' --exclude '*.pyc' -f /tmp/hs-ctx/hermes_station.tar hermes_station
          tar -c --exclude '__pycache__' -f /tmp/hs-ctx/extension.tar extension
          tar -c --exclude '__pycache__' --exclude '*.pyc' -f /tmp/hs-ctx/tests.tar tests
          tar -c -f /tmp/hs-ctx/docs.tar docs
          cp Dockerfile /tmp/hs-ctx/

      - name: build and push :staging
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: /tmp/hs-ctx
          target: runtime
          push: true
          tags: ghcr.io/roryford/hermes-station:staging
          build-args: |
            IMAGE_REVISION=${{ github.sha }}
          provenance: false
          sbom: false

      - name: wait for GHCR manifest to propagate
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          IMAGE="ghcr.io/roryford/hermes-station:staging"
          echo "$GHCR_TOKEN" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          for i in $(seq 1 60); do
            if docker manifest inspect "$IMAGE" >/dev/null 2>&1; then
              echo "manifest available after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "ERROR: manifest did not appear within 60s" >&2
          exit 1

      - name: deploy to staging
        run: |
          curl -fsSL https://backboard.railway.com/graphql/v2 \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{
              \"query\": \"mutation Deploy(\$svc: String!, \$env: String!) { serviceInstanceDeploy(serviceId: \$svc, environmentId: \$env, latestCommit: false) }\",
              \"variables\": {
                \"svc\": \"$RAILWAY_SERVICE_ID\",
                \"env\": \"$RAILWAY_ENVIRONMENT_ID\"
              }
            }"

  e2e:
    name: e2e tests against staging
    runs-on: ubuntu-latest
    needs: build-and-deploy
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: install dev deps
        run: uv sync --only-group dev --frozen --quiet

      - name: fetch staging credentials from Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
          RAILWAY_SERVICE_ID: ${{ secrets.RAILWAY_STAGING_SERVICE_ID }}
          RAILWAY_ENVIRONMENT_ID: ${{ secrets.RAILWAY_STAGING_ENVIRONMENT_ID }}
        run: |
          VARS=$(curl -fsSL https://backboard.railway.com/graphql/v2 \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            --data-raw "{\"query\":\"query { variables(projectId: \\\"$RAILWAY_PROJECT_ID\\\", serviceId: \\\"$RAILWAY_SERVICE_ID\\\", environmentId: \\\"$RAILWAY_ENVIRONMENT_ID\\\") }\"}")
          ADMIN_PW=$(echo "$VARS" | python3 -c "import sys,json; print(json.load(sys.stdin)['data']['variables']['HERMES_ADMIN_PASSWORD'])")
          WEBUI_PW=$(echo "$VARS" | python3 -c "import sys,json; print(json.load(sys.stdin)['data']['variables']['HERMES_WEBUI_PASSWORD'])")
          echo "::add-mask::$ADMIN_PW"
          echo "::add-mask::$WEBUI_PW"
          echo "STAGING_ADMIN_PASSWORD=$ADMIN_PW" >> "$GITHUB_ENV"
          echo "STAGING_WEBUI_PASSWORD=$WEBUI_PW" >> "$GITHUB_ENV"

      - name: wait for staging to serve new revision
        run: |
          # Two-phase readiness check.
          #
          # Phase 1: /health reports the new image_revision SHA. This proves
          # Railway has rolled the new container.
          #
          # Phase 2: probe the endpoints the e2e tests will hit and require
          # multiple consecutive non-5xx responses. Empirically, Railway can
          # serve /health on the new revision while still 502'ing on /login,
          # /admin/, and /api/auth/status for several seconds — see the
          # staging flake on 2db320e / 8dd2c1d (May 2026) which produced
          # `assert 502 == 200` and `httpx.ReadTimeout` against exactly these
          # endpoints.
          set -e
          SHA="${{ github.sha }}"
          REV=""
          for i in $(seq 1 90); do
            REV=$(curl -sf "$STAGING_URL/health" \
              | python3 -c "import sys,json; print(json.load(sys.stdin).get('versions',{}).get('image_revision',''))" 2>/dev/null || echo "")
            if [ "$REV" = "$SHA" ]; then
              echo "phase 1: staging on $SHA after $((i * 5))s"
              break
            fi
            sleep 5
          done
          if [ "$REV" != "$SHA" ]; then
            echo "ERROR: staging did not serve revision $SHA within 450s" >&2
            exit 1
          fi

          probe_nonfivexx() {
            local code
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$1" || echo "000")
            case "$code" in
              5*|000) return 1 ;;
              *)      return 0 ;;
            esac
          }
          for endpoint in /login /admin/ /api/auth/status; do
            url="${STAGING_URL}${endpoint}"
            consecutive=0
            stable=0
            for i in $(seq 1 60); do
              if probe_nonfivexx "$url"; then
                consecutive=$((consecutive + 1))
                if [ "$consecutive" -ge 3 ]; then
                  echo "phase 2: $endpoint stable (3 consecutive non-5xx after $((i * 2))s)"
                  stable=1
                  break
                fi
              else
                consecutive=0
              fi
              sleep 2
            done
            if [ "$stable" -ne 1 ]; then
              echo "ERROR: $endpoint did not stabilize within 120s" >&2
              exit 1
            fi
          done

      - name: run e2e tests
        env:
          HERMES_STATION_E2E_URL: ${{ env.STAGING_URL }}
          HERMES_STATION_E2E_ADMIN_PASSWORD: ${{ env.STAGING_ADMIN_PASSWORD }}
          HERMES_STATION_E2E_PASSWORD: ${{ env.STAGING_WEBUI_PASSWORD }}
        run: |
          uv run pytest tests/test_e2e_admin.py tests/test_e2e_dx.py tests/test_login_smoke.py -v --no-cov
