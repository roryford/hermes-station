name: base-image

# Builds + publishes the slowly-changing system base image (Dockerfile.base:
# chromium/ffmpeg/tesseract/node + pinned binaries) consumed by the main
# Dockerfile's `FROM`. Run manually whenever Dockerfile.base or the
# pinned-binaries inputs change, then bump the tag in the main Dockerfile's
# BASE_IMAGE arg. Published multi-arch so local arm64 (Apple `container`) and
# amd64 (CI/Railway) builds can both pull it.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g. v2). Bump when base deps change."
        required: true
        default: v1

permissions:
  contents: read
  packages: write  # required for GHCR push

jobs:
  build-and-push:
    name: build + push multi-arch base image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: stage build context
        # Dockerfile.base uses root-level COPY for the pinned-binaries inputs
        # (same CLI 0.12.3 constraint as the main Dockerfile — see CLAUDE.md).
        run: |
          mkdir -p /tmp/base-ctx
          cp Dockerfile.base scripts/pinned-binaries.tsv scripts/install_pinned_binaries.sh /tmp/base-ctx/

      - name: build and push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: /tmp/base-ctx
          file: /tmp/base-ctx/Dockerfile.base
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/roryford/hermes-station-base:${{ inputs.tag }}
          provenance: false
          sbom: false
