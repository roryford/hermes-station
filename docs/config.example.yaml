# hermes-station — minimal config.yaml
#
# This is the shape that boots cleanly with zero secrets:
# /health will report status: "ok" on first boot (all intended capabilities
# are ready; the gateway is idle pending a provider key).
# The container stays up and the admin UI is reachable at /admin.
#
# Drop this at /data/.hermes/config.yaml (or wherever HERMES_CONFIG_PATH
# points) and fill in secrets via .env / env vars — never inline.

# --- Primary LLM provider ----------------------------------------------------
# Leave this block commented out on a fresh deploy. The first-boot seeder
# writes it automatically when OPENROUTER_API_KEY (or ANTHROPIC_API_KEY /
# OPENAI_API_KEY) is set in the environment. Configure it manually here or
# via /admin/settings if you prefer a provider the seeder doesn't cover.
#
# model:
#   provider: openrouter
#   default: anthropic/claude-sonnet-4.6

# --- Delegation (sub-agent / tool-call) provider -----------------------------
# Can point at the same provider as `model` or a cheaper one for tool calls.
# Also seeded automatically if the primary model block is seeded.
#
# delegation:
#   provider: openrouter
#   model: anthropic/claude-haiku-4-5

# --- Web search --------------------------------------------------------------
# Uncomment to enable web search; requires BRAVE_API_KEY in the environment.
# web:
#   search_backend: brave

# --- Memory ------------------------------------------------------------------
# Holographic memory is the default and needs no external service.
memory:
  provider: holographic

# --- MCP servers -------------------------------------------------------------
# Curated entries land here disabled; flip `enabled: true` once you've
# supplied any keys they need. The admin UI manages this list for you.
#
# Stdio servers (command/args) run inside the container via npx or uvx.
# The URL-based entry (playwright-mcp) connects to an external service you
# deploy separately — fill in the URL before enabling.
mcp_servers:
  filesystem:
    command: npx
    args:
      - -y
      - "@modelcontextprotocol/server-filesystem@2025.8.21"
      - /data/workspace
    enabled: false
    # Scoped to /data/workspace — the model cannot read/write outside it.

  fetch:
    command: uvx
    args:
      - --from
      - mcp-server-fetch==2025.4.7
      - mcp-server-fetch
    enabled: false
    # Generic HTTP(S) fetcher with HTML→Markdown conversion. No API key needed.

  github:
    command: npx
    args:
      - -y
      - "@modelcontextprotocol/server-github@2025.4.8"
    env:
      GITHUB_PERSONAL_ACCESS_TOKEN: "${GITHUB_TOKEN}"
    enabled: false
    # Needs GITHUB_TOKEN or GH_TOKEN in the environment when enabled.
    # Issues, PRs, search, and file reads via the GitHub REST API.

  playwright-mcp:
    url: ""
    enabled: false
    # Browser automation via Playwright MCP.
    # Requires a separate Railway service running mcr.microsoft.com/playwright/mcp
    # (2 GB RAM, port 8931). Deploy it first, then set:
    #   url: http://<service>.railway.internal:8931/mcp

# --- Terminal passthrough ----------------------------------------------------
# Env vars hermes-station forwards into terminal subprocesses (gh CLI, etc.).
terminal:
  env_passthrough:
    - GITHUB_TOKEN
    - GH_TOKEN

# --- Display -----------------------------------------------------------------
display:
  personality: default   # neutral; no opinionated system-prompt overlay
  show_cost: true        # surface per-message token cost in the WebUI
