<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>hermes-station · admin login</title>
    <style>
        body { font-family: ui-sans-serif, system-ui, sans-serif; background: #0f1115; color: #e6e6e6;
               min-height: 100vh; display: grid; place-items: center; margin: 0; }
        form { background: #181b22; padding: 2.5rem; border-radius: 12px; min-width: 320px;
               box-shadow: 0 8px 24px rgba(0,0,0,0.25); }
        h1 { font-size: 1.25rem; margin: 0 0 1.5rem; }
        input[type=password] { width: 100%; padding: 0.6rem 0.8rem; box-sizing: border-box;
               background: #0f1115; color: #fff; border: 1px solid #2a2f3a; border-radius: 6px; }
        button { margin-top: 1rem; width: 100%; padding: 0.7rem; background: #4c8bf5; color: white;
                 border: none; border-radius: 6px; font-weight: 600; cursor: pointer; }
        button:hover { background: #3b78e3; }
        .error { color: #ff7676; margin-top: 1rem; font-size: 0.9rem; }
        .note { color: #9aa0a6; margin-top: 1rem; font-size: 0.85rem; }
    </style>
</head>
<body>
    <form method="post" action="/admin/login">
        <h1>hermes-station · admin</h1>
        {% if not auth_enabled %}
            <p class="note">Admin is locked — no password set. Add <code>HERMES_ADMIN_PASSWORD</code> to your Railway service variables (or <code>-e HERMES_ADMIN_PASSWORD=...</code> locally) to create your login.</p>
        {% else %}
            <input type="password" name="password" placeholder="Admin password" autofocus required>
            <button type="submit">Sign in</button>
        {% endif %}
        {% if error %}<div class="error">{{ error }}</div>{% endif %}
    </form>
</body>
</html>
