{% extends "admin/base.html" %}
{% block title %}hermes-station · {{ title }}{% endblock %}
{% block content %}
<h1>{{ title }}</h1>
<div class="grid logs-grid">
    {% for source in sources %}
    <section class="card">
        <div class="card-header">
            <h2>{{ source }}</h2>
            <a class="btn small ghost" href="/admin/api/logs/{{ source }}" target="_blank" rel="noopener">JSON</a>
        </div>
        <div id="logs-{{ source }}"
             hx-get="/admin/_partial/logs/{{ source }}"
             hx-trigger="load, every 3s"
             hx-swap="outerHTML">
            <pre class="log-box muted">Loading {{ source }} logs…</pre>
        </div>
    </section>
    {% endfor %}
</div>
{% endblock %}
{% block scripts %}
<script>
function _applyLogFilter(source, mode) {
    const list = document.getElementById('loglist-' + source);
    if (!list) return;
    const warn = new Set(['WARNING', 'WARN', 'ERROR', 'CRITICAL']);
    list.querySelectorAll('.log-row').forEach(function(row) {
        const level = row.dataset.level || '';
        row.style.display = (mode === 'all' || warn.has(level)) ? '' : 'none';
    });
    const btnAll = document.getElementById('btn-all-' + source);
    const btnWarn = document.getElementById('btn-warn-' + source);
    if (btnAll) btnAll.className = 'btn small' + (mode === 'all' ? '' : ' ghost');
    if (btnWarn) btnWarn.className = 'btn small' + (mode === 'warn' ? '' : ' ghost');
}

function filterLogs(source, mode) {
    sessionStorage.setItem('logFilter-' + source, mode);
    _applyLogFilter(source, mode);
}

// Restore active filter after each HTMX poll swap.
document.addEventListener('htmx:afterSwap', function(e) {
    const id = e.target && e.target.id;
    if (id && id.startsWith('logs-')) {
        const source = id.slice('logs-'.length);
        const mode = sessionStorage.getItem('logFilter-' + source) || 'all';
        _applyLogFilter(source, mode);
    }
});
</script>
{% endblock %}
